<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5e6d3" />
  <meta name="description" content="Your cozy productivity workspace — coming soon." />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <title>CozyDesk — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5e6d3;
      background-image:
        radial-gradient(circle at 20% 20%, #fde8f0 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #dff0fb 0%, transparent 50%);
      padding: 2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(180, 140, 110, 0.15);
      border: 1.5px solid rgba(255, 255, 255, 0.9);
    }

    .emoji { font-size: 3rem; margin-bottom: 1rem; display: block; }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #5c3d2e;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 1rem;
      color: #a07858;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 0.95rem;
      color: #7a5c46;
      line-height: 1.7;
      margin-bottom: 1.75rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #f9b8d0, #b8d8f9);
      color: #5c3d2e;
      font-weight: 800;
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🌸</span>
    <h1>CozyDesk</h1>
    <p class="tagline">Your cozy productivity workspace</p>
    <p>Something warm and wonderful is on its way — sticky notes, stickers, timers, and your perfect little desk setup.</p>
    <span class="badge">✨ Coming Soon</span>
  </div>
</body>
</html>
